<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHQ-9 FHIR R4 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-container">
  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="app-header">
    <div class="app-header__badge">FHIR R4 · IndexedDB Demo</div>
    <h1>PHQ-9 Depression Screener</h1>
    <p>A proof-of-concept showing FHIR-standardized clinical questionnaire data persisted in the browser via IndexedDB.</p>
  </header>

  <!-- ============================================================
       TABS
       ============================================================ -->
  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="questionnaire" role="tab" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Questionnaire
    </button>
    <button class="tab-btn" data-tab="database" role="tab" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      Database Explorer
    </button>
  </nav>

  <!-- ============================================================
       TAB 1: QUESTIONNAIRE
       ============================================================ -->
  <div id="panel-questionnaire" class="tab-panel active">
    <div class="card card--elevated">
      <div class="card__body">

        <!-- Progress -->
        <div class="progress-bar">
          <div class="progress-bar__info">
            <span id="progress-text">0 of 9 answered</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-bar__track">
            <div id="progress-fill" class="progress-bar__fill"></div>
          </div>
        </div>

        <!-- Patient info -->
        <div class="patient-form">
          <div class="form-group">
            <label for="given-name">First Name</label>
            <input type="text" id="given-name" placeholder="Jane" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="family-name">Last Name</label>
            <input type="text" id="family-name" placeholder="Doe" autocomplete="family-name">
          </div>
          <div class="form-group">
            <label for="birth-date">Date of Birth</label>
            <input type="date" id="birth-date">
          </div>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="other">Other</option>
              <option value="unknown">Unknown</option>
            </select>
          </div>
        </div>

        <!-- Questions injected here -->
        <div class="q-section-title">Over the last 2 weeks</div>
        <div class="q-section-subtitle">How often have you been bothered by any of the following problems?</div>
        <div id="questions-container"></div>

        <!-- Submit -->
        <div class="submit-section">
          <div class="running-score">Score: <strong id="running-total">0</strong> <span style="font-size:13px;color:var(--slate-400)">/ 27</span></div>
          <button class="btn btn--primary" id="btn-submit" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Submit &amp; Store in FHIR
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       TAB 2: DATABASE EXPLORER
       ============================================================ -->
  <div id="panel-database" class="tab-panel">
    <div class="db-toolbar">
      <button class="btn btn--outline btn--sm" id="btn-refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <button class="btn btn--outline btn--sm" id="btn-download">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download JSON
      </button>
      <button class="btn btn--danger btn--sm" id="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear Database
      </button>
    </div>

    <div id="db-stats" class="db-stats"></div>
    <div id="db-collections"></div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div id="modal-severity-badge"></div>
    <div class="modal__score" id="modal-score">0</div>
    <div class="modal__score-max">/ 27</div>
    <div class="modal__message" id="modal-message"></div>
    <div class="modal__fhir-note" id="modal-fhir-note"></div>
    <button class="btn btn--primary" id="modal-close">Done</button>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
